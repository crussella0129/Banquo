# Concrete — the stone. Mid-grey procedural texture with dark/rust/brown
# flecks. Portable appearance bundle (no fonts, no shell).

theme = "concrete"

[os.windows]
blur = true

[window]
edge_style = "beveled"
corner_style = "g3"
radius = 24.0
inset = 0.0

[ui]
top_margin = 0.0
tab_bar_mode = "persistent"
background_mode = "reveal"
