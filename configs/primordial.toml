# Primordial — the abyss. 80%-opacity black with sparse red plasma dots.
# Portable appearance bundle (no fonts, no shell).

theme = "primordial"

[os.windows]
blur = true

[window]
edge_style = "beveled"
corner_style = "g3"
radius = 24.0
inset = 0.0

[ui]
top_margin = 0.0
tab_bar_mode = "persistent"
background_mode = "reveal"
