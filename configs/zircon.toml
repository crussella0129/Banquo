# Zircon — the glass. Transparent substrate; blur delegated to the OS
# compositor. Banquo's default preset.
#
# Presets are portable appearance bundles: theme + window chrome + UI only.
# They never carry font paths, shell profiles, or anything machine-specific —
# applying one merges it over your config and leaves the rest untouched.

theme = "zircon"

[os.windows]
blur = true

[window]
edge_style = "flat"
corner_style = "square"
radius = 0.0
inset = 0.0

[ui]
top_margin = 32.0
tab_bar_mode = "auto"
