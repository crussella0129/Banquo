# Blanco — the canvas. Opaque white with a subtle paper-tooth dot texture;
# near-black glyphs. Portable appearance bundle (no fonts, no shell).

theme = "blanco"

[os.windows]
blur = true

[window]
edge_style = "beveled"
corner_style = "g3"
radius = 24.0
inset = 0.0

[ui]
top_margin = 0.0
tab_bar_mode = "persistent"
background_mode = "reveal"
